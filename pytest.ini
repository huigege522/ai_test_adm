[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 日志
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(message)s
log_date_format = %Y-%m-%d %H:%M:%S

# 标记说明（避免 PytestUnknownMarkWarning）
markers =
    smoke: 冒烟测试，P0 核心流程
    regression: 回归测试
    boundary: 边界值测试
    negative: 异常/负向测试
    db: 需要数据库连接的测试

# 报告（执行时追加 --html=reports/report.html）
addopts = -v --tb=short
